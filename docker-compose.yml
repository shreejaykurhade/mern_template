version: '3.8'

services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: mern_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password}
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: mern_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mern_network

  # ---------- Backend ----------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password}@mongo:27017/mern_template?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: 'true'
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server/src:/app/src
    networks:
      - mern_network

  # ---------- Frontend ----------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern_client
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./client/src:/app/src
    networks:
      - mern_network

volumes:
  mongo_data:
  redis_data:

networks:
  mern_network:
    driver: bridge
